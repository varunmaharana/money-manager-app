name: money-manager-app

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "8000:8000"
        env_file: .env
        depends_on:
            - postgres
            - redis
        networks:
            - app-network
        restart: unless-stopped
        # environment:
            # - HOSTNAME=localhost
            # - PORT=8000
            # - CLIENT_URL=http://localhost:3000
            # - DATABASE_HOST=0.0.0.0
            # - DATABASE_PORT=5432
            # - DATABASE_NAME=money_manager_app_db
            # - DATABASE_USERNAME=postgres
            # - DATABASE_PASSWORD=postgres
            # - REDIS_HOST=redis
            # - REDIS_PORT=6379

    postgres:
        image: postgres:15
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: money_manager_app_db
        ports:
            - "5434:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app-network

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        networks:
            - app-network

volumes:
    postgres_data:

networks:
    app-network:
        driver: bridge
